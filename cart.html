<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AilZaCafe - Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --light-pink: #FED9FE;
            --yellow: #FBBA00;
            --orange: #E5781E;
            --brown: #5A3D2B;
        }

        body {
            background-color: var(--light-pink);
            color: var(--brown);
        }

        header {
            background-color: var(--brown);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            color: var(--yellow);
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav ul li a {
            color: var(--light-pink);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: var(--yellow);
        }

        .user-actions {
            display: flex;
            gap: 1rem;
        }

        .user-actions a {
            color: var(--light-pink);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .user-actions a:first-child {
            background-color: var(--yellow);
            color: var(--brown);
        }

        .user-actions a:last-child {
            border: 1px solid var(--yellow);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        h1 {
            color: var(--brown);
            margin-bottom: 2rem;
            border-bottom: 3px solid var(--orange);
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        .empty-cart {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .empty-cart p {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .empty-cart a {
            display: inline-block;
            background-color: var(--orange);
            color: white;
            text-decoration: none;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .empty-cart a:hover {
            transform: scale(1.05);
            background-color: var(--yellow);
            color: var(--brown);
        }

        .cart-items {
            list-style: none;
            margin-bottom: 2rem;
        }

        .cart-item {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .cart-item:hover {
            transform: translateX(5px);
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        .item-details {
            flex: 1;
        }

        .item-details h3 {
            color: var(--brown);
            margin-bottom: 0.5rem;
        }

        .item-details .price {
            color: var(--orange);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .item-details .price::after {
            content: ' PHP';
            font-size: 0.9rem;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quantity-control input {
            width: 80px;
            padding: 0.5rem;
            border: 2px solid var(--light-pink);
            border-radius: 5px;
            text-align: center;
        }

        .remove-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .remove-btn:hover {
            background-color: #cc0000;
        }

        .cart-summary {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .subtotal {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--brown);
        }

        .subtotal span:last-child {
            color: var(--orange);
        }

        .subtotal span:last-child::after {
            content: ' PHP';
            font-size: 1rem;
        }

        .checkout-btn {
            display: inline-block;
            background-color: var(--yellow);
            color: var(--brown);
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .checkout-btn:hover {
            background-color: var(--orange);
            color: white;
        }

        .continue-shopping {
            display: inline-block;
            margin-top: 1rem;
            color: var(--orange);
            text-decoration: none;
        }

        .continue-shopping:hover {
            text-decoration: underline;
        }

        footer {
            background-color: var(--brown);
            color: var(--light-pink);
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="landing.html" class="logo">AilZaCafe</a>
        <nav>
            <ul>
                <li><a href="landing.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="account.html">Account</a></li>
            </ul>
        </nav>
        <div class="user-actions">
            <a href="signup.html">Sign Up</a>
            <a href="signin.html">Sign In</a>
        </div>
    </header>

    <div class="container">
        <h1>Shopping Cart</h1>
        <div id="cartContainer"></div>
    </div>

    <footer>
        <p>&copy; 2026 AilZaCafe. All rights reserved.</p>
    </footer>

    <script>
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cartContainer');

            if (!cart || cart.length === 0) {
                container.innerHTML = `
                    <section class="empty-cart">
                        <p>Your cart is currently empty</p>
                        <a href="products.html">Start Shopping</a>
                    </section>
                `;
                return;
            }

            let subtotal = 0;
            cart.forEach(item => {
                subtotal += item.price * (item.quantity || 1);
            });

            container.innerHTML = `
                <ul class="cart-items">
                    ${cart.map((item, index) => {
                        const itemTotal = item.price * (item.quantity || 1);
                        return `
                            <li class="cart-item">
                                <img src="${item.image || 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=400'}" alt="${item.name}">
                                <div class="item-details">
                                    <h3>${item.name}</h3>
                                    <p class="price">${item.price}</p>
                                </div>
                                <div class="quantity-control">
                                    <input type="number" value="${item.quantity || 1}" min="1" max="10" 
                                           onchange="updateQuantity(${index}, this.value)">
                                </div>
                                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                            </li>
                        `;
                    }).join('')}
                </ul>

                <section class="cart-summary">
                    <div class="subtotal">
                        <span>Subtotal:</span>
                        <span>${subtotal.toFixed(2)}</span>
                    </div>
                    <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
                    <a href="products.html" class="continue-shopping">← Continue Shopping</a>
                </section>
            `;
        }

        function updateQuantity(index, newQuantity) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart[index]) {
                cart[index].quantity = parseInt(newQuantity);
                localStorage.setItem('cart', JSON.stringify(cart));
                displayCart();
            }
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
        }

        displayCart();
    </script>
</body>
</html>
